name: collect
# BattleMetrics のスナップショット収集(5分間隔)。
# トークン + 身元入りUA + 低頻度の行儀の良いクライアント。
# スナップショットは AES-256-CBC で暗号化してからコミットする(公開リポのため生データは置かない)。
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: collect
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: fetch + encrypt snapshot
        env:
          BM_TOKEN: ${{ secrets.BM_TOKEN }}
          SNAP_KEY: ${{ secrets.SNAP_KEY }}
          INGEST_TOKEN: ${{ secrets.INGEST_TOKEN }}
        run: |
          set -u
          TS=$(date -u +%Y-%m-%dT%H%M%SZ)
          http=$(curl -s -o resp.json -w '%{http_code}' --max-time 45 \
            -A 'rust-watch/1.0 (personal server monitor; contact: nan.hanaoka@gmail.com)' \
            -H "Authorization: Bearer $BM_TOKEN" \
            'https://api.battlemetrics.com/servers/33856379?include=player')
          sz=$(stat -c%s resp.json 2>/dev/null || echo 0)
          echo "http=$http size=$sz"
          # サイズ閾値は使わない(低人口時間帯は正常応答でも小さく、100KB閾値が誤FAILした実績あり)。
          # 有効なJSONで data.attributes.players を持つことをもって正常応答と判定する。
          if [ "$http" != "200" ] || ! jq -e '.data.attributes.players' resp.json > /dev/null; then
            echo "FAIL: unexpected response"; head -c 300 resp.json || true; exit 1
          fi
          mkdir -p snapshots
          gzip -c resp.json > snapshot.json.gz
          openssl enc -aes-256-cbc -md sha256 -pass env:SNAP_KEY \
            -in snapshot.json.gz -out "snapshots/eu-east_${TS}.json.gz.enc"

          # v2 収集統一(2026-07-11): 同じ生データを POST /ingest にも転送(BMは二重に叩かない)。
          # ベストエフォート・失敗してもコミット経路(v1)には影響させない。secret未設定ならno-op。
          if [ -n "${INGEST_TOKEN:-}" ]; then
            code=$(curl -s --max-time 10 -o /dev/null -w '%{http_code}' \
              -H "Authorization: Bearer $INGEST_TOKEN" \
              -H "Content-Encoding: gzip" \
              --data-binary "@snapshot.json.gz" \
              "https://v2.rustwatch.nanya-nen.com/ingest?label=eu-east&captured_at=${TS}")
            echo "ingest http=$code"
          fi

      - name: commit
        run: |
          git config user.name 'rust-watch-bot'
          git config user.email 'nan.hanaoka@gmail.com'
          git add snapshots
          git diff --cached --quiet && exit 0
          git commit -m "snap $(date -u +%FT%TZ)"
          git pull --rebase --quiet && git push --quiet
