name: collect
# BattleMetrics のスナップショット収集(5分間隔)。
# トークン + 身元入りUA + 低頻度の行儀の良いクライアント。
# スナップショットは AES-256-CBC で暗号化してからコミットする(公開リポのため生データは置かない)。
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: collect
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: fetch + encrypt snapshot
        env:
          BM_TOKEN: ${{ secrets.BM_TOKEN }}
          SNAP_KEY: ${{ secrets.SNAP_KEY }}
        run: |
          set -u
          TS=$(date -u +%Y-%m-%dT%H%M%SZ)
          http=$(curl -s -o resp.json -w '%{http_code}' --max-time 45 \
            -A 'rust-watch/1.0 (personal server monitor; contact: nan.hanaoka@gmail.com)' \
            -H "Authorization: Bearer $BM_TOKEN" \
            'https://api.battlemetrics.com/servers/33856379?include=player')
          sz=$(stat -c%s resp.json 2>/dev/null || echo 0)
          echo "http=$http size=$sz"
          if [ "$http" != "200" ] || [ "$sz" -lt 100000 ]; then
            echo "FAIL: unexpected response"; head -c 300 resp.json || true; exit 1
          fi
          mkdir -p snapshots
          gzip -c resp.json | openssl enc -aes-256-cbc -md sha256 -pass env:SNAP_KEY \
            > "snapshots/eu-east_${TS}.json.gz.enc"

      - name: commit
        run: |
          git config user.name 'rust-watch-bot'
          git config user.email 'nan.hanaoka@gmail.com'
          git add snapshots
          git diff --cached --quiet && exit 0
          git commit -m "snap $(date -u +%FT%TZ)"
          git pull --rebase --quiet && git push --quiet
